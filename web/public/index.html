<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Q-Net 기출 풀이</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/views.css" />
  </head>
  <body>
    <header class="app-header shell-header">
      <div class="brand">
        <button
          id="sidebar-toggle"
          class="btn ghost sm sidebar-toggle"
          type="button"
          aria-label="사이드바 열기/닫기"
        >☰</button>
        <span class="brand-mark" aria-hidden="true">Q</span>
        <h1>Q-Net 기출 풀이</h1>
      </div>
      <div class="shell-header-actions">
        <span id="cli-dot" class="cli-dot" hidden></span>
        <button
          id="theme-toggle"
          class="btn ghost sm theme-toggle"
          type="button"
          aria-label="테마 전환"
        >◐</button>
        <div id="nickname-area" class="nickname-area"></div>
      </div>
    </header>

    <!-- CLI(agy·claude) 감지 상태 배너 -->
    <div id="cli-banner" class="cli-banner" hidden></div>

    <div class="shell-body">
      <aside id="sidebar" class="shell-sidebar" aria-label="자격증 탐색"></aside>
      <main id="app" class="app-main shell-main">
        <p class="loading">불러오는 중…</p>
      </main>
    </div>

    <footer class="app-footer">
      <span id="conn-status" class="conn-status">연결 대기</span>
    </footer>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
