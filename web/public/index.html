<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Q-Net 기출 풀이</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/views.css" />
    <link rel="stylesheet" href="/css/screens.css" />
  </head>
  <body>
    <!-- 감사 경고 배너: 허용 경계 밖 파일 수정이 원복됐을 때(SSE audit-warning) 노출 -->
    <div id="audit-banner" class="audit-banner" hidden></div>

    <!-- 전역 헤더(온보딩에서는 숨김) -->
    <header id="app-header" class="app-header" hidden>
      <div class="hdr-left">
        <span class="brand-mark" aria-hidden="true">Q</span>
        <nav id="breadcrumb" class="crumbs" aria-label="경로"></nav>
      </div>
      <div class="hdr-right">
        <span id="sse-badge" class="sse-badge" title="실시간 반영(SSE)"></span>
        <div id="cli-badges" class="cli-badges" aria-label="CLI 상태"></div>
        <button
          id="theme-toggle"
          class="icon-btn theme-toggle"
          type="button"
          aria-label="테마 전환"
        ></button>
        <span class="hdr-divider" aria-hidden="true"></span>
        <div id="nickname-area" class="nickname-area"></div>
      </div>
    </header>

    <main id="app" class="app-main qsc">
      <p class="loading" style="padding: 40px">불러오는 중…</p>
    </main>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
